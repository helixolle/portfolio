<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Text Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn { background-color: #25D366; color: white; padding: 15px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; transition: background 0.3s; }
        .btn:hover { background-color: #128C7E; }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Send Group Message</h1>
    <p>Click the button below to open your messaging app.</p>
    
    <a href="#" id="smsLink" class="btn">Launch Group Text</a>
</div>

<script>
    // 1. List your phone numbers here
    const phoneNumbers = ["0703285455", "0735151360", "0724496189"];
    
    // 2. Set your message body
    const message = "Hey everyone! This is the test group message!";

    // 3. Detect the Operating System
    const isIphone = /iPhone|iPad|iPod/.test(navigator.userAgent);
    
    // 4. Use a comma for iPhone, and a semicolon for Android
    const separator = isIphone ? ',' : ';';
    const numberString = phoneNumbers.join(separator);

    // 5. Construct the final link
    // Note: iPhone uses '&' to separate the body, some Androids prefer '?'
    const finalLink = `sms:${numberString}${isIphone ? '&' : '?'}body=${encodeURIComponent(message)}`;

    // 6. Apply to the button
    document.getElementById('smsLink').href = finalLink;
</script>

</body>
</html>
